<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>projeto-login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media_query.css">
</head>
<body>
    <main>
        <section id="login">
            <div class="log" id="imagem">
               
            </div>
            <div class="log" id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambinte.</p>
                <form action="login.php" method="post">
                    <div class="campo">
                        <i class="material-icons">person</i>

                        <input type="text" name="login" id="ilogin" placeholder="Coloque seu E-mail" autocomplete="email" required maxlength="30">

                        <label for="ilogin">Login</label>
                    </div>
                    <div class="campo">
                        <i class="material-icons">key</i>

                        <input type="password" name="senha" id="isenha" placeholder="Sua senha" autocomplete="current-password" required maxlength="20" minlength="8">

                        <label for="isenha">Senha</label>
                    </div>
                    <input type="submit" value="Enviar">
                    
                    <a href="esqueci.html">
                        Esqueci a senha <i class="material-icons">mail</i>
                    </a>
                </form>

            </div>
        </section>
    </main>
</body>
</html>
